    <h1>Employee Data</h1>

            <th>Details</th>
        </tr>

        <!-- Row 1 - Depan -->

        <!-- Row 3 - Sujata -->

            <td>3</td>

    </table>

    <br>

    <!-- ========================= -->
    <!--    ADD EMPLOYEE FORM      -->
    <!-- ========================= -->

    <h2>Add New Employee</h2>

    <form action="#" method="POST">

        <!-- ID Field -->
        <label for="id">Id:</label>
        <br>
        <input
            type="number"
            id="id"
            name="id"
            placeholder="Enter employee ID"
            required
        />
        <br><br>

        <!-- First Name Field -->
        <label for="fname">First Name:</label>
        <br>
        <input
            type="text"
            id="fname"
            name="fname"
            placeholder="Enter first name"
            required
        />
        <br><br>

        <!-- Last Name Field -->
        <label for="lname">Last Name:</label>
        <br>
        <input
            type="text"
            id="lname"
            name="lname"
            placeholder="Enter last name"
            required
        />
        <br><br>

        <!-- Position Field -->
        <label for="position">Position:</label>
        <br>
        <input
            type="text"
            id="position"
            name="position"
            placeholder="Enter position"
            required
        />
        <br><br>

        <!-- Salary Field -->
        <label for="salary">Salary:</label>
        <br>
        <input
            type="number"
            id="salary"
            name="salary"
            placeholder="Enter salary"
            required
        />
        <br><br>

        <!-- Add Employee Button -->
        <button type="submit">Add Employee</button>

    </form>

</body>
</html>
